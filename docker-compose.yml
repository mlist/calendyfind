services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database across container restarts
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: /app/data/app.db
      BETTER_AUTH_URL: http://localhost:3000
      NODE_ENV: production
    restart: unless-stopped
