services:
  app:
    build:
      context: .
      args:
        # BASE_PATH is baked into the Next.js bundle at build time.
        # Set it in .env to match your nginx subpath (e.g. /calendyfind).
        BASE_PATH: ${BASE_PATH:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Persist the SQLite database across container restarts
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: /app/data/app.db
      NODE_ENV: production
    restart: unless-stopped
